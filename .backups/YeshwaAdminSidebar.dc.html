<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</helmet>
<aside style="position:fixed;left:0;top:0;bottom:0;width:264px;background:#16242B;color:#C9D2D6;font-family:'Hanken Grotesk',sans-serif;display:flex;flex-direction:column;z-index:50;border-right:1px solid rgba(255,255,255,0.06);">
  <div style="padding:24px 22px 22px;border-bottom:1px solid rgba(255,255,255,0.08);">
    <div style="display:flex;align-items:center;gap:11px;">
      <span style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:9px;background:#D9824A;color:#16242B;font-family:'Newsreader',serif;font-weight:500;font-size:24px;line-height:1;padding-bottom:3px;">Y</span>
      <div style="line-height:1.1;"><div style="font-size:15px;font-weight:700;letter-spacing:0.14em;color:#F7F0E6;">YESHWA</div><div style="font-size:9px;font-weight:600;letter-spacing:0.16em;color:#7E8C93;margin-top:2px;">CONTENT STUDIO</div></div>
    </div>
  </div>

  <nav style="flex:1;overflow-y:auto;padding:18px 14px;">
    <p style="font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#5E6E76;margin:6px 12px 10px;">Website</p>
    <a href="Yeshwa-Admin.dc.html" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;text-decoration:none;font-size:14.5px;font-weight:500;margin-bottom:3px;{{ contentStyle }}">
      <span style="font-size:16px;width:20px;text-align:center;">✎</span>Content editor
    </a>
    <a href="Yeshwa-Admin.dc.html" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;text-decoration:none;font-size:14.5px;font-weight:500;color:#9DB0B8;margin-bottom:3px;">
      <span style="font-size:16px;width:20px;text-align:center;">▦</span>Pages
    </a>
    <a href="Yeshwa-Admin.dc.html" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;text-decoration:none;font-size:14.5px;font-weight:500;color:#9DB0B8;margin-bottom:3px;">
      <span style="font-size:16px;width:20px;text-align:center;">◳</span>Media library
    </a>

    <p style="font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#5E6E76;margin:22px 12px 10px;">Insights</p>
    <a href="Yeshwa-Enquiries.dc.html" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;text-decoration:none;font-size:14.5px;font-weight:500;margin-bottom:3px;{{ enquiriesStyle }}">
      <span style="font-size:16px;width:20px;text-align:center;">✉</span>Enquiries
      <span style="margin-left:auto;font-size:11px;font-weight:700;background:#D9824A;color:#16242B;border-radius:999px;padding:2px 8px;">14</span>
    </a>
    <a href="Yeshwa-Analytics.dc.html" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;text-decoration:none;font-size:14.5px;font-weight:500;margin-bottom:3px;{{ analyticsStyle }}">
      <span style="font-size:16px;width:20px;text-align:center;">◔</span>Analytics
    </a>

    <p style="font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#5E6E76;margin:22px 12px 10px;">Settings</p>
    <a href="Yeshwa-Admin.dc.html" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;text-decoration:none;font-size:14.5px;font-weight:500;color:#9DB0B8;margin-bottom:3px;">
      <span style="font-size:16px;width:20px;text-align:center;">⚙</span>Site settings
    </a>
  </nav>

  <div style="padding:14px;border-top:1px solid rgba(255,255,255,0.08);">
    <a href="Yeshwa-Home.dc.html" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:10px;text-decoration:none;font-size:14px;font-weight:600;color:#16242B;background:#E5915A;margin-bottom:12px;" style-hover="background:#D9824A;">↗ View live site</a>
    <div style="display:flex;align-items:center;gap:11px;padding:4px 4px 2px;">
      <span style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:#2D4654;color:#F7F0E6;font-size:13px;font-weight:700;">KT</span>
      <div style="line-height:1.2;"><div style="font-size:13px;font-weight:600;color:#F7F0E6;">KalyTrex Admin</div><div style="font-size:11px;color:#7E8C93;">Owner</div></div>
    </div>
  </div>
</aside>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;content&quot;,&quot;enquiries&quot;,&quot;analytics&quot;],&quot;default&quot;:&quot;content&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const a = this.props.active || 'content';
    const on = 'background:rgba(217,130,74,0.16);color:#F7F0E6;box-shadow:inset 3px 0 0 #D9824A;';
    const off = 'color:#9DB0B8;';
    return {
      contentStyle: a === 'content' ? on : off,
      enquiriesStyle: a === 'enquiries' ? on : off,
      analyticsStyle: a === 'analytics' ? on : off,
    };
  }
}
</script>
</body>
</html>
